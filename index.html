<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CS2 Mobile Mobile Edition</title>
    <style>
        html, body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #050708;
            font-family: system-ui, -apple-system, sans-serif;
            position: fixed; width: 100%; height: 100%;
            user-select: none; -webkit-user-select: none;
        }
        #game-container {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        canvas { display: block; background: #11141a; width: 100%; height: 100%; }
        #weapon-select-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(12, 17, 24, 0.96);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100;
        }
        .menu-title {
            color: #de9b35; font-size: 26px; font-weight: 800;
            margin-bottom: 25px; letter-spacing: 2px; text-transform: uppercase;
        }
        .weapon-btn {
            background: #1b222c; color: #e2e8f0; border: 1px solid #3b4856;
            padding: 18px 45px; margin: 8px; font-size: 16px; font-weight: 700;
            border-radius: 6px; cursor: pointer; width: 260px; text-align: center;
        }
        #hud-top {
            position: absolute; top: 20px; display: flex;
            justify-content: center; width: 100%; gap: 20px; pointer-events: none; z-index: 10;
        }
        #hud-bottom {
            position: absolute; bottom: 25px; left: 5%; right: 5%;
            display: flex; justify-content: space-between; pointer-events: none; z-index: 10;
        }
        .hud-card {
            background: rgba(11, 14, 19, 0.85); border-bottom: 3px solid #de9b35;
            color: #f8fafc; padding: 10px 20px; font-size: 20px; font-weight: 800; border-radius: 4px;
        }
        .health-text { color: #f43f5e; }
        .ammo-text { color: #eab308; }
        #game-prompt {
            position: absolute; top: 35%; color: #ef4444; font-size: 28px;
            font-weight: 900; display: none; z-index: 15; text-transform: uppercase; pointer-events: none;
        }
        #shoot-btn {
            position: absolute; right: 40px; bottom: 160px; width: 100px; height: 100px;
            background: rgba(239, 68, 68, 0.35); border: 2px solid #ef4444; border-radius: 50%;
            color: #ffffff; font-weight: 900; font-size: 18px;
            display: flex; justify-content: center; align-items: center; z-index: 20;
        }
        #reload-btn {
            position: absolute; right: 45px; bottom: 50px; width: 90px; height: 70px;
            background: rgba(59, 130, 246, 0.3); border: 2px solid #3b82f6; border-radius: 12px;
            color: #ffffff; font-weight: 800; font-size: 15px;
            display: flex; justify-content: center; align-items: center; z-index: 20;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="weapon-select-screen">
            <div class="menu-title">SELECT CS2 LOADOUT</div>
            <div id="btn-pistol" class="weapon-btn">USP-S (Pistol)</div>
            <div id="btn-rifle" class="weapon-btn">AK-47 (Rifle)</div>
            <div id="btn-sniper" class="weapon-btn">AWP (Sniper)</div>
        </div>
        <div id="hud-top"><div class="hud-card">SCORE: <span id="hud-score">0</span></div></div>
        <div id="hud-bottom">
            <div class="hud-card">+ <span id="hud-health" class="health-text">100</span></div>
            <div class="hud-card" style="color: #94a3b8;"><span id="hud-weapon">-</span></div>
            <div class="hud-card"><span id="hud-ammo" class="ammo-text">30</span>/<span id="hud-max-ammo">30</span></div>
        </div>
        <div id="game-prompt">RELOADING...</div>
        <div id="shoot-btn">FIRE</div>
        <div id="reload-btn">RELOAD</div>
        <canvas id="fpsCanvas"></canvas>
    </div>
    <script>
        const canvas = document.getElementById("fpsCanvas");
        const ctx = canvas.getContext("2d");
        let gameActive = false, score = 0, health = 100;
        let currentWeapon = { name: '', damage: 1, color: '', ammo: 30, maxAmmo: 30, reloadTime: 1500, recoil: 0, scope: false };
        let isReloading = false, flashbangAlpha = 0, muzzleFlashTimer = 0, damageOverlayTimer = 0;
        const enemies = [], maxEnemies = 3, player = { x: 0, z: 0 };
        const joystick = { active: false, startX: 0, startY: 0, vx: 0, vy: 0, maxRadius: 50 };

        function selectWeapon(name, damage, color, maxAmmo, reloadTime, recoil, scope) {
            currentWeapon = { name, damage, color, ammo: maxAmmo, maxAmmo, reloadTime, recoil, scope };
            document.getElementById("hud-weapon").innerText = name;
            updateHUD();
            document.getElementById("weapon-select-screen").style.display = "none";
            gameActive = true;
            initEnemies();
        }
        function updateHUD() {
            document.getElementById("hud-health").innerText = health;
            document.getElementById("hud-ammo").innerText = currentWeapon.ammo;
            document.getElementById("hud-max-ammo").innerText = currentWeapon.maxAmmo;
            document.getElementById("hud-score").innerText = score;
        }
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        function initEnemies() { enemies.length = 0; for(let i=0; i<maxEnemies; i++) { spawnEnemy(); } }
        function spawnEnemy() {
            enemies.push({ x: (Math.random() * 360) - 180, z: (Math.random() * 180) + 260, radius: 22, speed: (Math.random() * 0.8) + 0.8, shootCooldown: Math.random() * 90 + 60 });
        }

        // True Touch controls for raw HTML view
        document.getElementById("btn-pistol").addEventListener("click", () => selectWeapon('USP-S', 34, '#475569', 12, 1200, 2, false));
        document.getElementById("btn-rifle").addEventListener("click", () => selectWeapon('AK-47', 48, '#854d0e', 30, 2100, 12, false));
        document.getElementById("btn-sniper").addEventListener("click", () => selectWeapon('AWP', 115, '#166534', 10, 3200, 0, true));

        function setupControls() {
            window.addEventListener('touchstart', (e) => {
                for (let touch of e.changedTouches) {
                    if (touch.clientX < window.innerWidth / 2 && touch.clientY > window.innerHeight / 2) {
                        joystick.active = true; joystick.startX = touch.clientX; joystick.startY = touch.clientY;
                    }
                }
            });
            window.addEventListener('touchmove', (e) => {
                if(gameActive) e.preventDefault();
                if (!joystick.active) return;
                for (let touch of e.touches) {
                    if (touch.clientX < window.innerWidth / 2) {
                        let dx = touch.clientX - joystick.startX, dy = touch.clientY - joystick.startY;
                        let distance = Math.sqrt(dx*dx + dy*dy);
                        if (distance > joystick.maxRadius) { dx = (dx / distance) * joystick.maxRadius; dy = (dy / distance) * joystick.maxRadius; }
                        joystick.vx = dx / joystick.maxRadius; joystick.vy = dy / joystick.maxRadius;
                    }
                }
            }, { passive: false });
            window.addEventListener('touchend', () => { joystick.active = false; joystick.vx = 0; joystick.vy = 0; });
            document.getElementById("shoot-btn").addEventListener('click', shootWeapon);
            document.getElementById("reload-btn").addEventListener('click', reloadWeapon);
        }

        function reloadWeapon() {
            if (isReloading || currentWeapon.ammo === currentWeapon.maxAmmo) return;
            isReloading = true;
            document.getElementById("game-prompt").style.display = "block";
            setTimeout(() => {
                currentWeapon.ammo = currentWeapon.maxAmmo; isReloading = false;
                document.getElementById("game-prompt").style.display = "none"; updateHUD();
            }, currentWeapon.reloadTime);
        }
        function shootWeapon() {
            if (!gameActive || isReloading || flashbangAlpha > 0.5) return;
            if (currentWeapon.ammo <= 0) { reloadWeapon(); return; }
            currentWeapon.ammo--; muzzleFlashTimer = 4; updateHUD();
            player.x += (Math.random() - 0.5) * currentWeapon.recoil * 0.4;
            enemies.sort((a, b) => a.z - b.z);
            for (let i = 0; i < enemies.length; i++) {
                let e = enemies[i], factor = 420 / e.z;
                let screenX = (canvas.width / 2) + (e.x - player.x) * factor;
                let screenY = (canvas.height / 2) - (player.z) * factor;
                let dist = Math.sqrt(Math.pow(canvas.width / 2 - screenX, 2) + Math.pow((canvas.height / 2) - screenY, 2));
                if (dist < e.radius * factor) { enemies.splice(i, 1); score += 300; updateHUD(); spawnEnemy(); break; }
            }
        }
        function update() {
            if (!gameActive) return;
            player.x += joystick.vx * 3.8; player.z -= joystick.vy * 3.8;
            if (player.x < -180) player.x = -180; if (player.x > 180) player.x = 180;
            enemies.forEach((enemy) => {
                enemy.z -= enemy.speed;
                if (enemy.z > 180 && Math.random() < 0.0015 && flashbangAlpha <= 0) flashbangAlpha = 1.0;
                enemy.shootCooldown--;
                if (enemy.shootCooldown <= 0 && enemy.z > 20) {
                    health -= 14; damageOverlayTimer = 5; enemy.shootCooldown = Math.random() * 80 + 60; updateHUD();
