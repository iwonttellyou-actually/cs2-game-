<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minecraft 3D Enhanced - Pavilion Edition</title>
    <style>
        html, body {
            margin: 0; padding: 0; overflow: hidden;
            background: linear-gradient(to bottom, #7accff 0%, #b3e0ff 60%, #e1f3ff 100%); /* Atmospheric Sky */
            font-family: 'Segoe UI', system-ui, sans-serif;
            width: 100%; height: 100%;
            user-select: none; -webkit-user-select: none;
            touch-action: none;
        }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100%; height: 100%; position: absolute; z-index: 1; }
        
        /* Original Style Crosshair */
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 16px; height: 16px;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 10;
            mix-blend-mode: difference;
        }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: white; }
        #crosshair::before { top: 7px; left: -5px; width: 26px; height: 2px; }
        #crosshair::after { top: -5px; left: 7px; width: 2px; height: 26px; }

        /* Authentic Hotbar Menu UI */
        #hotbar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; background: rgba(141, 141, 141, 0.85); padding: 4px;
            border: 4px solid #3c3c3c; border-radius: 2px; z-index: 25;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .slot {
            width: 46px; height: 46px; margin: 0 3px; border: 4px solid #373737;
            background-size: cover; display: flex; align-items: flex-end; justify-content: flex-end;
            color: #fff; font-size: 12px; font-weight: bold; padding: 2px; text-shadow: 1px 1px 2px #000;
        }
        .slot.active { border-color: #ffffff; box-shadow: 0 0 10px #ffffff; }

        #jump-btn {
            position: absolute; right: 40px; bottom: 40px; width: 80px; height: 80px;
            background: rgba(255,255,255,0.25); border: 4px solid rgba(255,255,255,0.6);
            border-radius: 50%; color: white; font-weight: bold; font-size: 16px;
            display: flex; align-items: center; justify-content: center; z-index: 30;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="crosshair"></div>
        <div id="jump-btn">JUMP</div>
        <div id="hotbar">
            <div class="slot active" data-block="grass" style="background-color:#5cc43e;">1</div>
            <div class="slot" data-block="dirt" style="background-color:#866043;">2</div>
            <div class="slot" data-block="stone" style="background-color:#7f8385;">3</div>
            <div class="slot" data-block="wood" style="background-color:#a17249;">4</div>
            <div class="slot" data-block="leaves" style="background-color:#2e6f1c;">5</div>
            <div class="slot" data-block="diamond" style="background-color:#4dedf0;">6</div>
        </div>
        <canvas id="voxelCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("voxelCanvas");
        const ctx = canvas.getContext("2d");

        // Game Configuration Matrix
        const BLOCK_SIZE = 30;
        const WORLD_SIZE = 16;
        const blocks = [];

        // Realistic Physics and View Settings
        const player = { 
            x: 240, y: -300, z: 240, 
            yaw: 0, pitch: 0, 
            speed: 3, velocityY: 0, 
            isGrounded: false, height: 50 
        };
        const GRAVITY = 0.4;
        const JUMP_FORCE = -7;

        let activeItem = "grass";
        const keys = { w: false, a: false, s: false, d: false, " ": false };
        
        // Touch Interaction Mapping
        const joystick = { active: false, startX: 0, startY: 0, vx: 0, vy: 0 };
        const lookTouch = { active: false, lastX: 0, lastY: 0 };
        let lastTap = 0;

        function initWorld() {
            blocks.length = 0;
            // Generate structured landscape height mapping arrays
            for (let x = 0; x < WORLD_SIZE; x++) {
                for (let z = 0; z < WORLD_SIZE; z++) {
                    let groundHeight = Math.floor(Math.sin(x * 0.3) * 2 + Math.cos(z * 0.3) * 2) + 6;
                    for (let y = 0; y < groundHeight; y++) {
                        let type = "stone";
                        if (y === groundHeight - 1) type = "grass";
                        else if (y > groundHeight - 4) type = "dirt";
                        
                        if (y < 2 && Math.random() < 0.1) type = "diamond";

                        blocks.push({ x: x * BLOCK_SIZE, y: -y * BLOCK_SIZE, z: z * BLOCK_SIZE, type: type });
                    }

                    // Natural tree generation vectors
                    if (x > 3 && x < WORLD_SIZE-3 && z > 3 && z < WORLD_SIZE-3 && Math.random() < 0.03) {
                        let trunkBase = -groundHeight * BLOCK_SIZE;
                        for(let h=0; h<3; h++) {
                            blocks.push({ x: x*BLOCK_SIZE, y: trunkBase - (h*BLOCK_SIZE), z: z*BLOCK_SIZE, type: "wood" });
                        }
                        // Canopy
                        let leafBase = trunkBase - (3*BLOCK_SIZE);
                        for(let lx=-1; lx<=1; lx++) {
                            for(let lz=-1; lz<=1; lz++) {
                                blocks.push({ x: (x+lx)*BLOCK_SIZE, y: leafBase, z: (z+lz)*BLOCK_SIZE, type: "leaves" });
                            }
                        }
                    }
                }
            }
        }

        // Direct Touch Hotbar Processing Engine
        document.querySelectorAll(".slot").forEach(slot => {
            const select = () => {
                document.querySelectorAll(".slot").forEach(s => s.classList.remove('active'));
                slot.classList.add('active');
                activeItem = slot.getAttribute("data-block");
            };
            slot.addEventListener("touchstart", (e) => { e.stopPropagation(); select(); });
            slot.addEventListener("click", (e) => { e.stopPropagation(); select(); });
        });

        // Unblockable Universal Screen Activation Trigger
        window.addEventListener("pointerdown", (e) => {
            // Request Pointer Lock if mouse click is used
            if (e.pointerType === "mouse" && document.pointerLockElement !== canvas) {
                canvas.requestPointerLock();
            }
        });

        // Mouse Look Processing Engine
        document.addEventListener("mousemove", (e) => {
            if (document.pointerLockElement !== canvas) return;
            player.yaw += e.movementX * 0.003;
            player.pitch = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, player.pitch - e.movementY * 0.003));
        });

        // PC Action Clicks
        document.addEventListener("mousedown", (e) => {
            if (document.pointerLockElement !== canvas) return;
            if (e.button === 0) breakBlock();
            else if (e.button === 2) placeBlock();
        });

        // Touch Screen Controls Integration Zone
        window.addEventListener("touchstart", (e) => {
            const now = Date.now();
            for (let t of e.changedTouches) {
                if (t.target.id === "jump-btn") {
                    if (player.isGrounded) player.velocityY = JUMP_FORCE;
                } else if (t.clientX < window.innerWidth / 2) {
                    joystick.active = true; joystick.startX = t.clientX; joystick.startY = t.clientY;
                } else {
                    lookTouch.active = true; lookTouch.lastX = t.clientX; lookTouch.lastY = t.clientY;
                    if (now - lastTap < 220) placeBlock();
                    else setTimeout(() => { if (!lookTouch.active) breakBlock(); }, 150);
                    lastTap = now;
                }
            }
        }, { passive: false });

        window.addEventListener("touchmove", (e) => {
            e.preventDefault();
            for (let t of e.touches) {
                if (t.clientX < window.innerWidth / 2 && joystick.active) {
                    let dx = t.clientX - joystick.startX, dy = t.clientY - joystick.startY;
                    let len = Math.sqrt(dx*dx + dy*dy);
                    if (len > 40) { dx = (dx/len)*40; dy = (dy/len)*40; }
                    joystick.vx = dx / 40; joystick.vy = dy / 40;
                } else if (lookTouch.active) {
                    player.yaw += (t.clientX - lookTouch.lastX) * 0.008;
                    player.pitch = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, player.pitch - (t.clientY - lookTouch.lastY) * 0.008));
                    lookTouch.lastX = t.clientX; lookTouch.lastY = t.clientY;
                }
            }
        }, { passive: false });

        window.addEventListener("touchend", () => { joystick.active = false; joystick.vx = 0; joystick.vy = 0; lookTouch.active = false; });

        function breakBlock() { if (blocks.length > 0) blocks.pop(); }
        function placeBlock() {
            blocks.push({
                x: Math.floor((player.x + Math.sin(player.yaw)*50)/BLOCK_SIZE)*BLOCK_SIZE,
                y: Math.floor((player.y + player.height)/BLOCK_SIZE)*BLOCK_SIZE,
                z: Math.floor((player.z + Math.cos(player.yaw)*50)/BLOCK_SIZE)*BLOCK_SIZE,
                type: activeItem
            });
        }

        // Keyboard tracking mapping
        document.addEventListener("keydown", (e) => {
            if (e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = true;
            if (e.key === " " && player.isGrounded) player.velocityY = JUMP_FORCE;
            let num = parseInt(e.key);
            if (num >= 1 && num <= 6) {
                const slots = document.querySelectorAll(".slot");
                slots.forEach(s => s.classList.remove('active'));
